services:
  - type: web
    name: quickbite-api
    runtime: node
    repo: https://github.com/mashudhahmed/food-delivery-fullstack
    branch: main
    plan: starter
    buildCommand: ./render-build.sh
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        fromDatabase:
          name: quickbite-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: quickbite-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: quickbite-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: quickbite-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: quickbite-db
          property: database
      - key: JWT_SECRET
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false

  - type: redis
    name: quickbite-redis
    plan: starter
    maxmemoryPolicy: noeviction