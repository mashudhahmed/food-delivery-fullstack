services:
  - type: web
    name: quickbite-api
    runtime: node
    repo: https://github.com/mashudhahmed/food-delivery-fullstack
    branch: main
    plan: starter
    buildCommand: ./render-build.sh
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NODE_VERSION
        value: 20.18.0
      - key: DB_HOST
        fromDatabase:
          name: quickbite-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: quickbite-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: quickbite-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: quickbite-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: quickbite-db
          property: database
      - key: DB_POOL_SIZE
        value: 20
      - key: DB_IDLE_TIMEOUT
        value: 30000
      - key: DB_CONNECTION_TIMEOUT
        value: 5000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: ALLOWED_FILE_TYPES
        value: image/jpeg,image/png,image/jpg,image/webp